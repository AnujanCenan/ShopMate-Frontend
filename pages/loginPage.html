<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopMate Login</title>
    <link rel="stylesheet" href="../css/appStyles.css" />
  </head>
  <body>
    <div class="authPage">
      <div class="authCard">
        <div class="authLogoSection">
          <div class="authLogoPlaceholder">
            <img
              class="authLogo"
              src="../assets/logos/shopMateLogo.png"
              alt=""
            />
          </div>
          <p class="authTagline">Manage family shopping together</p>
        </div>
        <input
          type="email"
          placeholder="Email Address"
          class="authInput"
          id="loginEmailInput"
        />
        <input
          type="password"
          placeholder="Password"
          class="authInput"
          id="loginPasswordInput"
        />
        <div class="authBiometricRow">
          <button class="biometricButton">
            <img
              src="../assets/icons/fingerprint.svg"
              class="actionIcon"
              alt="Edit"
            />
          </button>
          <span class="authOrText"> OR </span>
          <button class="biometricButton">
            <img
              src="../assets/icons/faceid.svg"
              class="actionIcon"
              alt="Edit"
            />
          </button>
        </div>
        <button class="authButton" onclick="loginUser()">LOGIN</button>
        <button
          class="authTextButton forgotPasswordButton"
          onclick="renderForgotPasswordForm()"
        >
          Forgot Password?
        </button>
        <div class="authDivider">
          <span>OR</span>
        </div>
        <button
          class="secondaryButton authRegisterButton"
          onclick="window.location.href = './registerPage.html'"
        >
          Create Family Account
        </button>

        <p class="authInviteText">Already invited by your Group Admin?</p>
        <p class="authInviteSubText">
          Use the invitation email sent to your registered email address.
        </p>
      </div>
    </div>
    <div class="screenOverlay hidden" id="screenOverlay"></div>
    <div class="bottomSheet hidden" id="bottomSheet">
      <div class="bottomSheetHandle"></div>
      <div class="bottomSheetContent" id="bottomSheetContent"></div>
    </div>
    <script src="../js/stateManager.js"></script>
    <script src="../js/helpers.js"></script>
    <!-- <script src="../js/bottomSheet.js"></script> -->
    <script src="../js/authManager.js"></script>
    <script>
      async function loginUser() {
        const email = document.getElementById("loginEmailInput").value.trim();
        const password = document
          .getElementById("loginPasswordInput")
          .value.trim();

        const response = await fetch(`http://localhost:5113/api/login`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            userEmail: email,
            userPassword: password
          })
        });


        if (!response.ok) {
          console.error(response.json())
          showDialog("Invalid Login", "Please check your email and password.");
          return;
        }

        appState.loggedIn = true;
        appState.activeGroup = "Family Group";
        saveAppState();

        // appState.currentUser = {
        //   id: user.id,

        //   name: user.name,

        //   email: user.email,
        //   role: "admin",
        // };

        // appState.loggedIn = true;

        // appState.activeGroup = "Family Group";

        // saveAppState();

        window.location.href = "./dashboardPage.html";
      }
    </script>
  </body>
</html>
